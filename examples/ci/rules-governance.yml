name: Rule Governance

on:
  pull_request:
    paths:
      - "src/clawsentry/gateway/attack_patterns.yaml"
      - "src/clawsentry/gateway/evolved_patterns.yaml"
      - "src/clawsentry/gateway/skills/**"
      - "examples/sample-events.jsonl"
      - "pyproject.toml"
      - ".github/workflows/rules-governance.yml"
  push:
    branches: [main]
    paths:
      - "src/clawsentry/gateway/attack_patterns.yaml"
      - "src/clawsentry/gateway/evolved_patterns.yaml"
      - "src/clawsentry/gateway/skills/**"
      - "examples/sample-events.jsonl"
      - "pyproject.toml"
      - ".github/workflows/rules-governance.yml"

jobs:
  rules-governance:
    name: Rules governance report
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ClawSentry with development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run rules lint
        run: python -m clawsentry rules lint --json

      - name: Run rules dry-run smoke
        run: python -m clawsentry rules dry-run --events examples/sample-events.jsonl --json

      - name: Write rules governance artifact
        run: python -m clawsentry rules report --output artifacts/rules-report.json --events examples/sample-events.jsonl --summary-markdown artifacts/rules-dashboard.md --json

      - name: Upload rules governance artifact
        uses: actions/upload-artifact@v6
        with:
          name: rules-governance-report
          path: |
            artifacts/rules-report.json
            artifacts/rules-dashboard.md
          if-no-files-found: error
          retention-days: 30
